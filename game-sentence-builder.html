<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumeRead - Sentence Builder</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-orange-50 text-gray-800 min-h-screen">
  <main class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
      <a data-back href="student.html" class="text-sm bg-white px-4 py-2 rounded-full shadow"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <div class="flex flex-wrap gap-2 text-xs">
        <span class="bg-white px-3 py-1 rounded-full">Learner: <strong data-student-name>Student</strong></span>
        <span class="bg-white px-3 py-1 rounded-full">Difficulty: <strong data-difficulty>starter</strong></span>
        <span class="bg-white px-3 py-1 rounded-full" data-ai-status>AI status</span>
      </div>
    </div>

    <section class="bg-white rounded-2xl shadow p-6 md:p-8">
      <p class="text-sm text-orange-600 font-semibold">Reading Comprehension Game</p>
      <h1 class="text-3xl font-bold">Sentence Builder</h1>
      <p class="text-gray-600 mt-2">Tap words in order, then answer a comprehension question.</p>

      <div class="bg-teal-50 rounded-2xl p-4 mt-6">
        <h2 class="font-semibold"><i class="fas fa-book-open text-teal-600"></i> Mini Lesson</h2>
        <p data-lesson class="text-sm text-gray-600 mt-1"></p>
      </div>

      <div class="bg-orange-50 min-h-20 border border-orange-100 rounded-2xl p-5 mt-6 text-2xl font-bold" data-built></div>
      <div data-words class="flex flex-wrap gap-3 mt-5"></div>
      <button data-reset class="mt-4 text-sm bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full">Reset words</button>

      <div class="mt-6">
        <label class="block text-sm font-semibold mb-2" data-question></label>
        <input data-answer type="text" class="w-full px-4 py-3 rounded-2xl border border-gray-200" placeholder="Type your answer">
      </div>
      <button data-submit class="mt-4 bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-full font-semibold">Check Sentence</button>
      <p data-feedback class="text-teal-700 font-medium mt-5 min-h-6"></p>

      <div data-done class="hidden mt-6 bg-green-50 border border-green-200 rounded-2xl p-4">
        <h2 class="font-bold text-green-700">Sentence complete!</h2>
        <p class="text-sm text-gray-600">Result: <span data-score></span>. Your reading progress was saved.</p>
      </div>
    </section>
  </main>
  <script src="firebase-config.js"></script>
  <script src="ai-config.js"></script>
  <script src="numeread-data.js"></script>
  <script src="numeread-ai.js"></script>
  <script src="game-core.js"></script>
  <script src="game-sentence-builder.js"></script>
</body>
</html>
