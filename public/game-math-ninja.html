<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NumeRead · Math Ninja</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="ninja-container">
  <div class="top-bar">
    <button class="btn-dashboard" id="backDashboardBtn"><i class="fas fa-arrow-left"></i> Dashboard</button>
    <div class="stats-pills">
      <span class="pill"><i class="fas fa-user-graduate"></i> Learner: <strong id="studentNameDisplay">Student</strong></span>
      <span class="pill"><i class="fas fa-chart-line"></i> Difficulty: <strong id="difficultyDisplay">Easy</strong></span>
      <span class="pill ai-badge"><i class="fas fa-microchip"></i> <span id="aiStatusSpan">AI · active</span></span>
    </div>
  </div>

  <div class="game-card">
    <div class="flex-header">
      <div>
        <div class="badge-lesson"><i class="fas fa-shuriken"></i> Math Game</div>
        <h1>Math Ninja 🥷</h1>
        <div class="subhead">Choose the correct sum and sharpen number facts.</div>
      </div>
      <div class="round-badge ninja-round">Round <span id="roundDisplay">1/5</span></div>
    </div>

    <!-- Mini Lesson Section -->
    <div class="lesson-bubble ninja-lesson">
      <div class="lesson-icon"><i class="fas fa-lightbulb"></i></div>
      <div class="lesson-text" id="lessonText">Addition joins two amounts. Count on from the bigger number or make ten first.</div>
    </div>

    <!-- Ninja Progress / Health Bar -->
    <div class="ninja-progress">
      <div class="ninja-stats">
        <span><i class="fas fa-star"></i> Score: <strong id="scoreCount">0</strong></span>
        <span><i class="fas fa-bolt"></i> Combo: <strong id="comboCount">0</strong></span>
      </div>
      <div class="ninja-track">
        <div class="ninja-fill" id="ninjaFill" style="width: 0%;"></div>
      </div>
      <div class="ninja-stones" id="ninjaStones"></div>
    </div>

    <!-- Math Prompt -->
    <div class="prompt-card ninja-prompt" id="promptText">0 + 0</div>

    <!-- Choices Grid -->
    <div id="choicesContainer" class="choices-grid ninja-choices"></div>

    <!-- Feedback Area -->
    <div id="feedbackMsg" class="feedback-message"></div>

    <!-- Completion Area -->
    <div id="completionPanel" class="completion-card hidden">
      <i class="fas fa-trophy" style="color:#f5b042;"></i> <strong>Ninja round complete!</strong><br>
      <span id="scoreMessage"></span> Your numeracy progress was saved.
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="ai-config.js"></script>
<script src="numeread-data.js"></script>
<script src="numeread-ai.js"></script>
<script src="game-core.js"></script>
<script src="game-math-ninja.js"></script>
</body>
</html>
