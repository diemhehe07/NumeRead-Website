<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumeRead - Math Ninja</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-teal-50 text-gray-800 min-h-screen">
  <main class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
      <a data-back href="student.html" class="text-sm bg-white px-4 py-2 rounded-full shadow"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <div class="flex flex-wrap gap-2 text-xs">
        <span class="bg-white px-3 py-1 rounded-full">Learner: <strong data-student-name>Student</strong></span>
        <span class="bg-white px-3 py-1 rounded-full">Difficulty: <strong data-difficulty>starter</strong></span>
        <span class="bg-white px-3 py-1 rounded-full" data-ai-status>AI status</span>
      </div>
    </div>

    <section class="bg-white rounded-2xl shadow p-6 md:p-8">
      <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-5">
        <div>
          <p class="text-sm text-teal-600 font-semibold">Math Game</p>
          <h1 class="text-3xl font-bold">Math Ninja</h1>
          <p class="text-gray-600 mt-2">Choose the correct sum and sharpen number facts.</p>
        </div>
        <div class="bg-teal-100 text-teal-700 px-4 py-2 rounded-2xl font-bold">Round <span data-round>1/5</span></div>
      </div>

      <div class="bg-orange-50 rounded-2xl p-4 mt-6">
        <h2 class="font-semibold"><i class="fas fa-lightbulb text-orange-500"></i> Mini Lesson</h2>
        <p data-lesson class="text-sm text-gray-600 mt-1"></p>
      </div>

      <p data-prompt class="text-5xl font-bold text-center mt-8"></p>
      <div data-choices class="grid sm:grid-cols-3 gap-4 mt-6"></div>
      <p data-feedback class="text-center text-teal-700 font-medium mt-5 min-h-6"></p>

      <div data-done class="hidden mt-6 bg-green-50 border border-green-200 rounded-2xl p-4 text-center">
        <h2 class="font-bold text-green-700">Ninja round complete!</h2>
        <p class="text-sm text-gray-600">Score: <span data-score></span>. Your numeracy progress was saved.</p>
      </div>
    </section>
  </main>
  <script src="firebase-config.js"></script>
  <script src="ai-config.js"></script>
  <script src="numeread-data.js"></script>
  <script src="numeread-ai.js"></script>
  <script src="game-core.js"></script>
  <script src="game-math-ninja.js"></script>
</body>
</html>
